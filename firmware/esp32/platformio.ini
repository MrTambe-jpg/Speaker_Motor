; PlatformIO Project Configuration for ESP32 Motor Controller
; OMNISOUND - Universal Motor Speaker System

[env:esp32]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino
lib_ldf_mode = deep

lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.0.0
    madhephaestus/ESP32Servo@^3.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DASYNC_TCP_SSL_ENABLED=1
    -DPIO_CI_BUILD=1

monitor_speed = 115200
upload_speed = 921600

[env:esp32-wifi]
extends = env:esp32
build_flags =
    ${env:esp32.build_flags}
    -DWIFI_MODE=1

[env:esp32-bt]
extends = env:esp32
build_flags =
    ${env:esp32.build_flags}
    -DBT_MODE=1