name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version'
        required: true
        default: '1.0.0'

jobs:
  # ===========================================
  # Create Release
  # ===========================================
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build ESP32
        run: |
          pip install platformio
          cd firmware/esp32
          pio run

      - name: Build GUI
        run: |
          cd gui
          npm install
          npm run build

      - name: Generate Release Notes
        run: |
          cat > release_notes.md << 'EOF'
          # OMNISOUND Release

          ## What's New
          - Thin client architecture for ESP32
          - Embedded web interface
          - Real-time audio processing on connected device
          - Multiple hardware platform support

          ## Installation
          1. Flash ESP32 with firmware
          2. Connect to WiFi "OMNISOUND"
          3. Open http://192.168.1.1

          ## Changes
          See CHANGELOG for detailed changes.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            firmware/esp32/.pio/build/esp32dev/firmware.bin
            omnisound/gui/dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Build Docker Image
  # ===========================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    if: false  # Optional: Enable if you have Docker setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: omnisound:latest
          cache-from: type=registry
          cache-to: type=inline